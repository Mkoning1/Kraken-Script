<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kraken bot</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090d;
    --surface: #12161f;
    --surface-2: #171c27;
    --border: #232a38;
    --text: #f2f4f7;
    --text-muted: #7a8394;
    --accent: #ffb020;
    --positive: #1fe088;
    --negative: #ff3d5e;
    --positive-glow: rgba(31,224,136,0.35);
    --negative-glow: rgba(255,61,94,0.35);
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { max-width: 560px; margin: 0 auto; padding: 20px 16px 48px; }

  .mono { font-family: "IBM Plex Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--text-muted);
  }
  .mode-badge {
    display: inline-block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 5px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .mode-badge.dry { color: var(--text-muted); border: 1px solid var(--border); }
  .mode-badge.live { color: var(--negative); border: 1px solid var(--negative); background: rgba(255,61,94,0.1); }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .refresh-btn:active { background: var(--surface); }

  /* ---------- HERO ---------- */
  .hero {
    text-align: center;
    padding: 28px 16px 24px;
    margin-bottom: 12px;
  }
  .hero-label {
    font-size: 12.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .hero-number {
    font-family: "Space Grotesk", sans-serif;
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .hero-number.pos { color: var(--positive); text-shadow: 0 0 40px var(--positive-glow); }
  .hero-number.neg { color: var(--negative); text-shadow: 0 0 40px var(--negative-glow); }
  .hero-number.flat { color: var(--text-muted); }
  .hero-sentence {
    margin-top: 14px;
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  .hero-sentence b { font-weight: 700; }

  /* ---------- health strip ---------- */
  .health-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    font-size: 12.5px;
    color: var(--text-muted);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .health-strip.warn {
    color: var(--negative);
    background: rgba(255,61,94,0.08);
    border: 1px solid rgba(255,61,94,0.35);
    font-weight: 600;
  }
  .health-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--positive); flex-shrink: 0; }
  .health-strip.warn .health-dot { background: var(--negative); }

  /* ---------- cards ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: "Space Grotesk", sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 12px;
  }

  .now-visual { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
  .now-coin {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 800;
    font-size: 19px;
  }
  .now-badge {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }
  .now-badge.safe { color: var(--text-muted); background: var(--surface-2); }
  .now-badge.runner { color: var(--accent); background: rgba(255,176,32,0.12); }

  .safety-block { margin-top: 16px; }
  .safety-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 7px;
  }
  .safety-track {
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .safety-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--negative), var(--accent), var(--positive));
  }
  .safety-marker {
    position: absolute;
    top: -3px;
    width: 3px;
    height: 16px;
    background: #fff;
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(255,255,255,0.6);
  }

  .empty { color: var(--text-muted); font-size: 14px; line-height: 1.5; }

  /* ---------- simple history ---------- */
  .hist-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-radius: 10px;
    background: var(--surface-2);
    border-left: 4px solid var(--border);
  }
  .hist-row.pos { border-left-color: var(--positive); }
  .hist-row.neg { border-left-color: var(--negative); }
  .hist-left { display: flex; flex-direction: column; gap: 2px; }
  .hist-sym { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 14.5px; }
  .hist-when { font-size: 11.5px; color: var(--text-muted); }
  .hist-pnl { font-family: "IBM Plex Mono", monospace; font-weight: 700; font-size: 19px; }
  .hist-pnl.pos { color: var(--positive); text-shadow: 0 0 14px var(--positive-glow); }
  .hist-pnl.neg { color: var(--negative); text-shadow: 0 0 14px var(--negative-glow); }

  .track-record {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .track-item .num { font-family: "IBM Plex Mono", monospace; font-size: 19px; font-weight: 700; display: block; }
  .track-item .lbl { font-size: 11px; color: var(--text-muted); }

  /* ---------- details (collapsed) ---------- */
  .details-toggle {
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    font-family: -apple-system, sans-serif;
    cursor: pointer;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .details-panel { display: none; }
  .details-panel.open { display: block; }

  .watch-row {
    padding: 10px 12px 10px 13px;
    margin-bottom: 6px;
    border-radius: 8px;
    background: var(--surface-2);
    border-left: 3px solid var(--border);
    font-size: 13px;
  }
  .watch-row.up { border-left-color: var(--positive); }
  .watch-row.down { border-left-color: var(--negative); }
  .watch-row-top { display: flex; justify-content: space-between; align-items: baseline; }
  .watch-row .sym { font-family: "Space Grotesk", sans-serif; font-weight: 700; }
  .watch-row .price { font-family: "IBM Plex Mono", monospace; color: var(--text-muted); font-size: 12.5px; }
  .watch-row .delta { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; font-weight: 700; }
  .watch-row .delta.up { color: var(--positive); }
  .watch-row .delta.down { color: var(--negative); }

  .raw-kv { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12.5px; border-bottom: 1px solid var(--border); }
  .raw-kv:last-child { border-bottom: none; }
  .raw-kv .k { color: var(--text-muted); }
  .raw-kv .v { font-family: "IBM Plex Mono", monospace; }

  .equity-chart { display: block; margin-bottom: 14px; }

  footer {
    text-align: center;
    color: var(--text-muted);
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    margin-top: 20px;
  }

  .error-box {
    background: var(--surface);
    border: 1px solid var(--negative);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13.5px;
    line-height: 1.5;
  }
  .error-box .title { color: var(--negative); font-weight: 700; margin-bottom: 6px; font-family: "Space Grotesk", sans-serif; }
  .error-box code { font-family: "IBM Plex Mono", monospace; background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header>
  <h1>Kraken bot <span id="mode-badge"></span></h1>
  <button class="refresh-btn" id="refresh-btn" aria-label="Ververs">↻</button>
</header>

<div id="hero"></div>
<div id="health"></div>
<div id="app"><p class="empty">Laden…</p></div>

<footer id="footer"></footer>

<script>
  // ---- Pas dit aan als je repo anders heet -------------------------------
  const GITHUB_USER = "Mkoning1";
  const GITHUB_REPO = "Kraken-Script";
  const BRANCH = "main";
  // -------------------------------------------------------------------------

  const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/bot_state.json?_=${Date.now()}`;
  const REFRESH_MS = 60000;

  function fmtPrice(x) {
    if (x === null || x === undefined) return "—";
    const ax = Math.abs(x);
    if (ax === 0) return "0";
    if (ax >= 1) return x.toFixed(4);
    if (ax >= 0.0001) return x.toFixed(6);
    return x.toFixed(10);
  }
  function fmtEur(x) {
    if (x === null || x === undefined) return "—";
    return `€${x.toLocaleString("nl-NL", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  }
  function fmtPct(x, digits = 2) {
    if (x === null || x === undefined) return "—";
    const sign = x > 0 ? "+" : "";
    return `${sign}${x.toFixed(digits)}%`;
  }
  function timeAgo(isoString) {
    if (!isoString) return "onbekend";
    const diffMs = Date.now() - new Date(isoString).getTime();
    const min = Math.round(diffMs / 60000);
    if (min < 1) return "zojuist";
    if (min < 60) return `${min} min geleden`;
    const hrs = Math.round(min / 60);
    if (hrs < 24) return `${hrs} uur geleden`;
    return `${Math.round(hrs / 24)} dagen geleden`;
  }
  function el(tag, className, html) {
    const e = document.createElement(tag);
    if (className) e.className = className;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  // ---- Berekent het TOTALE resultaat: afgeronde trades (samengesteld) x
  // de nog openstaande positie (indien van toepassing). Eén getal dat het
  // hele verhaal vertelt, i.p.v. losse percentages die je zelf moet optellen.
  function computeTotals(state) {
    const trades = state.trade_history || [];
    const realized = trades.reduce((acc, t) => acc * (1 + t.pnl_pct / 100), 1);
    let unrealizedPct = null;
    if (state.in_position && state.entry_price && state.current_price) {
      unrealizedPct = (state.current_price / state.entry_price - 1) * 100;
    }
    const combined = unrealizedPct !== null ? realized * (1 + unrealizedPct / 100) : realized;
    return {
      totalPct: (combined - 1) * 100,
      realizedPct: (realized - 1) * 100,
      unrealizedPct,
      hasAny: trades.length > 0 || state.in_position,
    };
  }

  function renderHero(state) {
    const hero = document.getElementById("hero");
    const t = computeTotals(state);

    if (!t.hasAny) {
      hero.innerHTML = `
        <div class="hero">
          <div class="hero-label">TOTAALRESULTAAT</div>
          <div class="hero-number flat">€0,00</div>
          <div class="hero-sentence">Nog niks gebeurd — de bot is aan het zoeken naar de eerste kans.</div>
        </div>`;
      return;
    }

    const cls = t.totalPct > 0.01 ? "pos" : t.totalPct < -0.01 ? "neg" : "flat";
    let sentence;
    if (state.in_position) {
      const amount = state.position_size;
      const base = (state.symbol || "").split("/")[0];
      const value = state.current_price && amount ? state.current_price * amount : null;
      sentence = `Bot houdt <b>${amount ? amount.toLocaleString("nl-NL", {maximumFractionDigits: 4}) : ""} ${base}</b> vast` +
        (value !== null ? `, nu <b>${fmtEur(value)}</b> waard` : "") +
        (state.entry_time ? `, sinds ${timeAgo(state.entry_time)}` : "") + ".";
    } else {
      sentence = "Geen open positie — de bot is aan het zoeken naar de volgende kans.";
    }

    hero.innerHTML = `
      <div class="hero">
        <div class="hero-label">TOTAALRESULTAAT SINDS START</div>
        <div class="hero-number ${cls}">${fmtPct(t.totalPct)}</div>
        <div class="hero-sentence">${sentence}</div>
      </div>`;
  }

  function renderHealth(state) {
    const box = document.getElementById("health");
    const staleMinutes = state.last_run_at
      ? Math.round((Date.now() - new Date(state.last_run_at).getTime()) / 60000)
      : null;
    const isStale = staleMinutes !== null && staleMinutes > 30;

    if (isStale) {
      box.innerHTML = `<div class="health-strip warn"><span class="health-dot"></span>
        Bot reageert niet meer — laatste check ${staleMinutes} min geleden (hoort ~15 min te zijn). Check de Actions-tab.</div>`;
    } else {
      box.innerHTML = `<div class="health-strip"><span class="health-dot"></span>
        Bot is actief — laatste check ${timeAgo(state.last_run_at)}</div>`;
    }
  }

  // ---- "Wat gebeurt er nu" in gewone taal, geen ATR-jargon vooraan -------
  function renderNowCard(state) {
    const card = el("div", "card");
    card.appendChild(el("p", "card-title", "Wat de bot nu doet"));

    if (!state.in_position) {
      const n = (state.config && state.config.watchlist) ? state.config.watchlist.length : 0;
      card.appendChild(el("p", "empty",
        `De bot bekijkt ${n || "een aantal"} munten en wacht tot er eentje duidelijk begint te stijgen. ` +
        `Zodra dat gebeurt, koopt hij automatisch.`));
      return card;
    }

    const base = (state.symbol || "").split("/")[0];
    const pnlPct = state.entry_price && state.current_price ? (state.current_price / state.entry_price - 1) * 100 : null;

    const visual = el("div", "now-visual");
    visual.appendChild(el("span", "now-coin", state.symbol));
    visual.appendChild(el("span", "now-badge " + (state.is_runner ? "runner" : "safe"),
      state.is_runner ? "GROTE WINST MOGELIJK" : "VOORZICHTIG NOG"));
    card.appendChild(visual);

    if (pnlPct !== null) {
      const expl = pnlPct >= 0
        ? "Deze positie staat momenteel op winst."
        : "Deze positie staat momenteel op verlies — dat gebeurt vaker, de bot verkoopt pas als het echt te veel wordt.";
      card.appendChild(el("p", "empty", expl));
    }

    // Veiligheidsbalk: waar zit de huidige prijs tussen "verkoop-grens" en de piek.
    // Vervangt de rauwe ATR-cijfers door een simpel "hoe dicht bij de rem"-beeld.
    const threshold = (state.config && state.config.runner_threshold_atr) || 3.0;
    if (state.current_atr && state.entry_price && state.current_price && state.peak_price) {
      const trailMult = state.is_runner ? 6.0 : 2.0; // moet gelijk blijven aan de waarden in het script
      const stopLevel = state.peak_price - trailMult * state.current_atr;
      const rangeTop = state.peak_price;
      const rangeBottom = stopLevel - state.current_atr; // wat lucht onder de stop voor perspectief
      const pos = (state.current_price - rangeBottom) / ((rangeTop - rangeBottom) || 1);
      const posClamped = Math.max(0, Math.min(pos, 1));

      const block = el("div", "safety-block");
      const label = el("div", "safety-label");
      label.appendChild(el("span", null, "Verkoopt automatisch als de koers te veel terugvalt"));
      label.appendChild(el("span", null, state.is_runner ? "ruime marge" : "krappe marge"));
      block.appendChild(label);
      const track = el("div", "safety-track");
      const marker = el("div", "safety-marker");
      marker.style.left = `calc(${Math.round(posClamped * 100)}% - 1px)`;
      track.appendChild(marker);
      block.appendChild(track);
      card.appendChild(block);
    }

    return card;
  }

  function renderHistorySimple(state) {
    const card = el("div", "card");
    card.appendChild(el("p", "card-title", "Eerdere trades"));
    const trades = (state.trade_history || []).slice().reverse();

    if (trades.length === 0) {
      card.appendChild(el("p", "empty", "Nog geen afgeronde trades — verschijnt zodra de bot voor het eerst verkoopt."));
      return card;
    }

    const wins = trades.filter(t => t.pnl_pct > 0).length;
    const winRate = Math.round((wins / trades.length) * 100);
    const track = el("div", "track-record");
    [[trades.length, "trades"], [`${winRate}%`, "raak"]].forEach(([num, lbl]) => {
      const item = el("div", "track-item");
      item.appendChild(el("span", "num", String(num)));
      item.appendChild(el("span", "lbl", lbl));
      track.appendChild(item);
    });
    card.appendChild(track);

    trades.slice(0, 15).forEach(t => {
      const row = el("div", "hist-row " + (t.pnl_pct >= 0 ? "pos" : "neg"));
      const left = el("div", "hist-left");
      left.appendChild(el("div", "hist-sym", t.symbol));
      left.appendChild(el("div", "hist-when", timeAgo(t.exit_time)));
      row.appendChild(left);
      row.appendChild(el("div", "hist-pnl " + (t.pnl_pct >= 0 ? "pos" : "neg"), fmtPct(t.pnl_pct, 1)));
      card.appendChild(row);
    });
    return card;
  }

  // ---- Technische details: dezelfde info als voorheen, nu weggestopt -----
  function renderDetailsPanel(state) {
    const panel = el("div", "details-panel");
    panel.id = "details-panel";

    if (state.in_position) {
      const card = el("div", "card");
      card.appendChild(el("p", "card-title", "Ruwe cijfers — positie"));
      [
        ["Paar", state.symbol],
        ["Instapprijs", `€${fmtPrice(state.entry_price)}`],
        ["Huidige prijs", `€${fmtPrice(state.current_price)}`],
        ["Piek sinds instap", `€${fmtPrice(state.peak_price)}`],
        ["Modus", state.is_runner ? "RUNNER (brede stop)" : "initieel (smalle stop)"],
      ].forEach(([k, v]) => {
        const row = el("div", "raw-kv");
        row.appendChild(el("span", "k", k));
        row.appendChild(el("span", "v", v));
        card.appendChild(row);
      });
      panel.appendChild(card);
    } else {
      const card = el("div", "card");
      const total = (state.config && state.config.watchlist) ? state.config.watchlist.length : Object.keys(state.watchlist_snapshot || {}).length;
      card.appendChild(el("p", "card-title", `Watchlist · top ${Math.min(10, total)} van ${total}`));
      const snap = state.watchlist_snapshot || {};
      const sorted = Object.keys(snap).map(sym => ({ sym, ...snap[sym] }))
        .sort((a, b) => (b.pct_vs_breakout ?? -999) - (a.pct_vs_breakout ?? -999));
      if (sorted.length === 0) {
        card.appendChild(el("p", "empty", "Nog geen data."));
      }
      sorted.slice(0, 10).forEach(({ sym, price, pct_vs_breakout }) => {
        const isUp = (pct_vs_breakout ?? 0) >= 0;
        const dir = isUp ? "up" : "down";
        const row = el("div", "watch-row " + dir);
        const top = el("div", "watch-row-top");
        top.appendChild(el("span", "sym", sym));
        top.appendChild(el("span", "price", `€${fmtPrice(price)}`));
        top.appendChild(el("span", "delta " + dir, pct_vs_breakout !== null ? `${isUp ? "▲" : "▼"} ${fmtPct(pct_vs_breakout)}` : "—"));
        row.appendChild(top);
        card.appendChild(row);
      });
      panel.appendChild(card);
    }

    if ((state.trade_history || []).length >= 2) {
      const chartCard = el("div", "card");
      chartCard.appendChild(el("p", "card-title", "Rendement over tijd"));
      chartCard.insertAdjacentHTML("beforeend", buildEquitySparkline(state.trade_history));
      panel.appendChild(chartCard);
    }

    return panel;
  }

  function buildEquitySparkline(trades) {
    const points = [0];
    let acc = 1;
    trades.forEach(t => { acc *= (1 + t.pnl_pct / 100); points.push((acc - 1) * 100); });
    const w = 100, h = 36, pad = 2;
    const min = Math.min(0, ...points), max = Math.max(0, ...points);
    const range = (max - min) || 1;
    const coords = points.map((p, i) => {
      const x = pad + (i / (points.length - 1 || 1)) * (w - 2 * pad);
      const y = h - pad - ((p - min) / range) * (h - 2 * pad);
      return [x, y];
    });
    const last = points[points.length - 1];
    const isUp = last >= 0;
    const color = isUp ? "var(--positive)" : "var(--negative)";
    const gradId = isUp ? "gradUp" : "gradDown";
    const zeroY = h - pad - ((0 - min) / range) * (h - 2 * pad);
    const lineStr = coords.map(c => c.join(",")).join(" ");
    const areaStr = `${pad},${zeroY} ` + lineStr + ` ${w - pad},${zeroY}`;
    return `
      <svg class="equity-chart" viewBox="0 0 ${w} ${h}" width="100%" height="48" preserveAspectRatio="none">
        <defs>
          <linearGradient id="gradUp" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--positive)" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="var(--positive)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="gradDown" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--negative)" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="var(--negative)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="0" y1="${zeroY.toFixed(1)}" x2="${w}" y2="${zeroY.toFixed(1)}" stroke="var(--border)" stroke-width="1" />
        <polygon points="${areaStr}" fill="url(#${gradId})" stroke="none" />
        <polyline points="${lineStr}" fill="none" stroke="${color}" stroke-width="2.2"
          stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" />
      </svg>`;
  }

  let detailsOpen = false;

  function render(state) {
    const badge = document.getElementById("mode-badge");
    if (state.dry_run === undefined) badge.innerHTML = "";
    else if (state.dry_run) badge.innerHTML = `<span class="mode-badge dry">DRY RUN</span>`;
    else badge.innerHTML = `<span class="mode-badge live">● LIVE — ECHT GELD</span>`;

    renderHero(state);
    renderHealth(state);

    const app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(renderNowCard(state));
    app.appendChild(renderHistorySimple(state));

    const toggle = el("button", "details-toggle", detailsOpen ? "Verberg technische details ▴" : "Toon technische details ▾");
    toggle.addEventListener("click", () => { detailsOpen = !detailsOpen; render(state); });
    app.appendChild(toggle);

    const panel = renderDetailsPanel(state);
    if (detailsOpen) panel.classList.add("open");
    app.appendChild(panel);

    document.getElementById("footer").textContent = `ververst automatisch elke ${REFRESH_MS / 1000}s`;
  }

  function renderError(message) {
    const app = document.getElementById("app");
    document.getElementById("hero").innerHTML = "";
    document.getElementById("health").innerHTML = "";
    app.innerHTML = "";
    const box = el("div", "error-box");
    box.appendChild(el("div", "title", "Kan de botstatus niet ophalen"));
    box.appendChild(el("div", null, message));
    app.appendChild(box);
  }

  async function load() {
    try {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) {
        renderError(`GitHub gaf status ${res.status} terug voor <code>bot_state.json</code>. ` +
          `Heeft de workflow al minstens 1 keer succesvol gedraaid?`);
        return;
      }
      const state = await res.json();
      render(state);
    } catch (err) {
      renderError(`Netwerkfout: ${err.message}. Check <code>GITHUB_USER</code>/<code>GITHUB_REPO</code> ` +
        `bovenin dit bestand, of probeer het over een minuut opnieuw.`);
    }
  }

  document.getElementById("refresh-btn").addEventListener("click", load);
  load();
  setInterval(load, REFRESH_MS);
</script>

</body>
</html>
